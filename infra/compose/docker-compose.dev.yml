version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: authorpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authorpilot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: authorpilot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: authorpilot-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: authorpilot-api
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/authorpilot
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: authorpilot-worker
    restart: unless-stopped
    env_file:
      - ../../apps/worker/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/authorpilot
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: authorpilot-web
    restart: unless-stopped
    env_file:
      - ../../apps/web/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
